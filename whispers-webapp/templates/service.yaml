apiVersion: v1
kind: Service
metadata:
  name: {{ include "whispers-webapp.fullname" . }}
spec:
  selector:
    app: {{ include "whispers-webapp.fullname" . }}
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP