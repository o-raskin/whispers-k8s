service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: nginx
  host: whispers.example.com
  tls:
    enabled: true
    secretName: whispers-webapp-tls

config:
  PUBLIC_APP_ORIGIN: https://whispers.example.com
  API_BASE_URL: https://whispers.example.com/api
  TURN_HOST: turn.example.com
  TURN_PORT: "3478"
